<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdTool</title>
    <style>
      :root { background: #071012; color: #d5dfda; }
      :root[data-theme="light"] { background: #f1f4f2; color: #20302d; }
      body { margin: 0; background: inherit; }
      .startup-screen { display: grid; height: 100vh; place-items: center; font: 14px system-ui, "Microsoft YaHei", sans-serif; }
    </style>
    <script>document.documentElement.dataset.theme = localStorage.getItem("mdtool.theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");</script>
  </head>
  <body><div id="app"><div class="startup-screen">正在启动 mdTool…</div></div><script type="module" src="/src/main.ts"></script></body>
</html>
